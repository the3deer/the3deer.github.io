<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The 3Deer Portfolio</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 0; background: #1a1a1a; color: #e0e0e0; line-height: 1.6; }
        header { background: #111111; color: white; padding: 1rem 2rem; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        header .brand { font-size: 1.5rem; font-weight: bold; color: #e0e0e0; text-decoration: none; }
        header .brand span { color: #4CAF50; }
        header .nav-links { display: flex; align-items: center; }
        header .nav-links a { color: #e0e0e0; text-decoration: none; margin-left: 1.5rem; font-size: 1rem; transition: color 0.2s; }
        header .nav-links a:hover { color: #4CAF50; }
        .hero { text-align: center; padding: 6rem 2rem 4rem; }
        .hero h1 { color: #ffffff; font-size: 3em; margin: 0 0 1rem 0; }
        .hero h1 span { color: #4CAF50; }
        .hero p { font-size: 1.25em; color: #b0b0b0; max-width: 650px; margin: 0 auto; }
        .projects-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 2rem; padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .card { background: #2c2c2c; border: 1px solid #333; border-radius: 12px; padding: 2rem; text-decoration: none; color: #e0e0e0; transition: transform 0.2s, border-color 0.2s; display: flex; flex-direction: column; }
        .card:hover { transform: translateY(-5px); border-color: #64b5f6; }
        .card h2 { margin-top: 0; color: #ffffff; font-size: 1.5em; margin-bottom: 0.5rem; }
        .card p { color: #b0b0b0; flex-grow: 1; margin-bottom: 1.5rem; }
        .card-link { color: #64b5f6; font-weight: bold; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="brand">The <span>3Deer</span></a>
        <nav class="nav-links">
            {{top_menu}}
            <a href="https://github.com/the3deer" class="github-corner" aria-label="View source on GitHub">
                <svg width="80" height="80" viewBox="0 0 250 250" style="fill:#151513; color:#fff; position: absolute; top: 0; border: 0; right: 0;" aria-hidden="true">
                    <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
                    <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin: 130px 106px;" class="octo-arm"></path>
                    <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.3 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor" class="octo-body"></path>
                </svg>
            </a>
            <style>
            .github-corner:hover .octo-arm {
                animation: octocat-wave 560ms ease-in-out;
            }
            @keyframes octocat-wave {
                0%, 100% { transform: rotate(0); }
                20%, 60% { transform: rotate(-25deg); }
                40%, 80% { transform: rotate(10deg); }
            }
            </style>
        </nav>
    </header>
    <div class="hero">
        {{hero_content}}
    </div>
    <div class="projects-container">
        {{project_cards}}
    </div>
</body>
</html>
