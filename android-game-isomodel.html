    <style>
        :root {
            --bg-color: #1a1a1a;
            --primary-text-color: #e0e0e0;
            --secondary-text-color: #b0b0b0;
            --header-bg: #111111;
            --border-color: #333;
            --accent-green: #4CAF50;
            --accent-blue: #64b5f6;
            --code-bg: #2c2c2c;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--primary-text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
        }

        /* --- Header --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .header .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-text-color);
            text-decoration: none;
        }

        .header .logo .green {
            color: var(--accent-green);
        }

        .header .top-menu { display: flex; align-items: center; }
        .header .top-menu a {
            color: var(--primary-text-color);
            text-decoration: none;
            margin-left: 1.5rem;
            font-size: 1rem;
            transition: color 0.2s ease-in-out;
        }

        .header .top-menu a:hover {
            color: var(--accent-green);
        }

        /* --- Main Layout --- */
        .container {
            display: flex;
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            padding-right: 2rem;
            position: sticky;
            top: 2rem;
            align-self: flex-start;
            height: calc(100vh - 4rem);
            overflow-y: auto;
        }

        .sidebar h3 {
            margin-top: 0;
            color: var(--accent-green);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar ul a {
            color: var(--secondary-text-color);
            text-decoration: none;
            display: block;
            padding: 0.4rem 0;
            transition: color 0.2s ease-in-out;
        }

        .sidebar ul a:hover {
            color: var(--primary-text-color);
        }

        /* --- Main Content --- */
        .main-content {
            flex-grow: 1;
            min-width: 0; /* Prevents flexbox overflow */
        }

        .main-content h1, .main-content h2, .main-content h3, .main-content h4 {
            color: #ffffff;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
            margin-top: 2.5rem;
        }

        .main-content h1 { font-size: 2.5rem; }
        .main-content h2 { font-size: 2rem; }
        .main-content h3 { font-size: 1.5rem; }

        .main-content a {
            color: var(--accent-blue);
            text-decoration: none;
        }

        .main-content a:hover {
            text-decoration: underline;
        }

        .main-content p {
            color: var(--secondary-text-color);
        }

        .main-content strong {
            color: var(--primary-text-color);
        }

        .main-content pre {
            background-color: var(--code-bg);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }

        .main-content code {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.9rem;
        }
        
        .main-content :not(pre) > code {
            background-color: var(--code-bg);
            padding: .2em .4em;
            margin: 0;
            font-size: 85%;
            border-radius: 6px;
        }

        .main-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        /* --- Responsive Design --- */
        @media (max-width: 992px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                position: static;
                width: 100%;
                border-right: none;
                padding-right: 0;
                margin-bottom: 2rem;
                height: auto;
                overflow-y: visible;
            }
        }
    </style>
